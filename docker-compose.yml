version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aurellis_postgres_dev
    environment:
      POSTGRES_USER: aurellis_user
      POSTGRES_PASSWORD: aurellis_password
      POSTGRES_DB: aurellis_scraping_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Opcional: Interfaz gráfica pgAdmin para ver los datos fácilmente
  pgadmin:
    image: dpage/pgadmin4
    container_name: aurellis_pgadmin_dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aurellis.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
